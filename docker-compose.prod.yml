# =============================================================================
# docker-compose.prod.yml - Production Overrides
# =============================================================================
# Use with:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Backend: Production overrides
  # ---------------------------------------------------------------------------
  backend:
    image: menu-extraction-backend:${APP_VERSION:-latest}
    build:
      target: runtime
      cache_from:
        - menu-extraction-backend:latest
    environment:
      APP_ENV: production
      LOG_LEVEL: warning
      # Production: more workers for throughput
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      MAX_WORKERS: ${MAX_WORKERS:-8}
      # Gunicorn tuning
      GUNICORN_TIMEOUT: "120"
      GUNICORN_KEEPALIVE: "5"
      GUNICORN_GRACEFUL_TIMEOUT: "30"
    # No source-code volume mounts in production
    volumes:
      - outputs-data:/app/outputs
      - logs-data:/app/logs
    command: ["backend-prod"]       # Uses gunicorn + uvicorn workers
    deploy:
      mode: replicated
      replicas: ${BACKEND_REPLICAS:-1}
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"
        reservations:
          cpus: "0.5"
          memory: "512M"
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    # Only bind to localhost in production (nginx handles external traffic)
    ports:
      - "127.0.0.1:8000:8000"

  # ---------------------------------------------------------------------------
  # Frontend: Production overrides
  # ---------------------------------------------------------------------------
  frontend:
    image: menu-extraction-frontend:${APP_VERSION:-latest}
    environment:
      APP_ENV: production
      STREAMLIT_SERVER_RUN_ON_SAVE: "false"
      STREAMLIT_LOGGER_LEVEL: warning
    volumes:
      - logs-data:/app/logs
    command: ["frontend-prod"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
        reservations:
          cpus: "0.25"
          memory: "256M"
    ports:
      - "127.0.0.1:8501:8501"

  # ---------------------------------------------------------------------------
  # Redis: Production hardened config
  # ---------------------------------------------------------------------------
  redis:
    command: >
      redis-server
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
      --protected-mode yes
      --loglevel notice
    # Do NOT expose Redis publicly in production
    ports: []
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "768M"

  # ---------------------------------------------------------------------------
  # Nginx: Always start in production (no profile needed)
  # ---------------------------------------------------------------------------
  nginx:
    profiles: []                  # Remove the 'with-nginx' profile gate
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${SSL_CERT_PATH:-./docker/nginx/certs}:/etc/nginx/certs:ro
      - logs-data:/var/log/nginx
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
