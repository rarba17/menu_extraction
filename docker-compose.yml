# =============================================================================
# Menu Extraction System - Docker Compose (Base Configuration)
# =============================================================================
# This is the BASE configuration. Use with overrides:
#   Development : docker-compose -f docker-compose.yml -f docker-compose.override.yml up
#   Production  : docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Shared configuration anchors (YAML anchors for DRY config)
# ---------------------------------------------------------------------------
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    labels: "service"
    tag: "{{.Name}}"

x-restart-policy: &restart-policy
  restart: unless-stopped

x-common-env: &common-env
  TZ: UTC
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  # Internal network for service-to-service communication
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.100.0/24
  # Separate network for external-facing services (nginx)
  frontend-network:
    driver: bridge

# ---------------------------------------------------------------------------
# Named Volumes
# ---------------------------------------------------------------------------
volumes:
  # Persistent output storage
  outputs-data:
    driver: local
  # Redis persistence
  redis-data:
    driver: local
  # Log storage
  logs-data:
    driver: local

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # =========================================================================
  # Backend: FastAPI Application
  # =========================================================================
  backend:
    image: menu-extraction-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: menu-extraction-backend
    <<: *restart-policy
    environment:
      <<: *common-env
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BACKEND_HOST: "0.0.0.0"
      BACKEND_PORT: "8000"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      MAX_WORKERS: ${MAX_WORKERS:-4}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      REDIS_URL: redis://redis:6379/0
      OUTPUT_DIR: /app/outputs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Persist outputs between restarts
      - outputs-data:/app/outputs
      # Persist logs
      - logs-data:/app/logs
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *default-logging
    # Resource limits (base - overridden in prod)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
        reservations:
          cpus: "0.25"
          memory: "256M"
    command: ["backend"]
    labels:
      - "com.menu-extraction.service=backend"
      - "com.menu-extraction.version=2.0.0"

  # =========================================================================
  # Frontend: Streamlit Application
  # =========================================================================
  frontend:
    image: menu-extraction-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: menu-extraction-frontend
    <<: *restart-policy
    environment:
      <<: *common-env
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      FRONTEND_PORT: "8501"
      APP_ENV: ${APP_ENV:-production}
      # Streamlit-specific config
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      STREAMLIT_LOGGER_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    networks:
      - app-network
      - frontend-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
        reservations:
          cpus: "0.1"
          memory: "128M"
    command: ["frontend"]
    labels:
      - "com.menu-extraction.service=frontend"
      - "com.menu-extraction.version=2.0.0"

  # =========================================================================
  # Redis: Caching Layer (optional but recommended)
  # =========================================================================
  redis:
    image: redis:7.2-alpine
    container_name: menu-extraction-redis
    <<: *restart-policy
    command: >
      redis-server
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --loglevel ${REDIS_LOG_LEVEL:-notice}
      --appendonly yes
      --appendfsync everysec
    # No host port binding — backend reaches Redis via internal Docker network
    # Dev override exposes port 6380 for local inspection
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
        reservations:
          cpus: "0.05"
          memory: "64M"
    labels:
      - "com.menu-extraction.service=redis"

  # =========================================================================
  # Nginx: Reverse Proxy / Load Balancer (optional)
  # =========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: menu-extraction-nginx
    <<: *restart-policy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # Mount SSL certs if available
      - ${SSL_CERT_PATH:-./docker/nginx/certs}:/etc/nginx/certs:ro
      - logs-data:/var/log/nginx
    networks:
      - frontend-network
      - app-network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "128M"
        reservations:
          cpus: "0.05"
          memory: "32M"
    profiles:
      # Only start nginx when explicitly requested:
      # docker-compose --profile with-nginx up
      - with-nginx
    labels:
      - "com.menu-extraction.service=nginx"
