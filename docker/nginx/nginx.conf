# =============================================================================
# docker/nginx/nginx.conf - Nginx Reverse Proxy Configuration
# =============================================================================
# Routes:
#   /api/*       → Backend FastAPI  (port 8000)
#   /            → Frontend Streamlit (port 8501)
#   /nginx-health → Nginx health check endpoint
# =============================================================================

user nginx;
worker_processes auto;                 # Auto-detect CPU cores
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

# Tune for production
worker_rlimit_nofile 65535;

events {
    worker_connections 1024;
    use epoll;                         # Linux-optimized event model
    multi_accept on;
}

http {
    # ---------------------------------------------------------------------------
    # MIME types and basic settings
    # ---------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging format
    # ---------------------------------------------------------------------------
    log_format main_ext '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'rt=$request_time uct="$upstream_connect_time" '
                         'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main_ext;

    # ---------------------------------------------------------------------------
    # Performance tuning
    # ---------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;                  # Hide nginx version

    # Compression (gzip)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # Rate limiting zones
    # ---------------------------------------------------------------------------
    # General API rate limit: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    # Upload rate limit: 2 req/s per IP (for file uploads)
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

    # ---------------------------------------------------------------------------
    # Client body size (for file uploads - must match backend MAX_FILE_SIZE)
    # ---------------------------------------------------------------------------
    client_max_body_size 15M;
    client_body_buffer_size 1M;
    client_body_timeout 60s;
    client_header_timeout 30s;

    # ---------------------------------------------------------------------------
    # Upstream: Backend (FastAPI)
    # ---------------------------------------------------------------------------
    upstream backend_upstream {
        least_conn;                     # Load balancing strategy
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ---------------------------------------------------------------------------
    # Upstream: Frontend (Streamlit)
    # ---------------------------------------------------------------------------
    upstream frontend_upstream {
        server frontend:8501;
        keepalive 16;
    }

    # ---------------------------------------------------------------------------
    # Security headers map
    # ---------------------------------------------------------------------------
    map $sent_http_content_type $expires {
        default                    off;
        text/html                  epoch;
        text/css                   max;
        application/javascript     max;
        ~image/                    max;
    }

    # ---------------------------------------------------------------------------
    # Main server block
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;                  # Match any hostname

        # Nginx health check (no logging)
        location = /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # -----------------------------------------------------------------
        # API: Route /api/* to FastAPI backend
        # -----------------------------------------------------------------
        location /api/ {
            # Strip /api prefix and forward to backend
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://backend_upstream;

            # Rate limiting for API endpoints
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            # Proxy headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts (generous for AI inference)
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # HTTP/1.1 for keepalive
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # CORS headers (optional - already handled by FastAPI)
            add_header Access-Control-Allow-Origin  * always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        }

        # Rate limiting for upload endpoints specifically
        location /api/extract-menu {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://backend_upstream;
            limit_req zone=upload_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout    180s;
            proxy_read_timeout    180s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Disable buffering for streaming responses
            proxy_buffering off;
        }

        # -----------------------------------------------------------------
        # Direct backend health check (no rewrite needed)
        # -----------------------------------------------------------------
        location /health {
            proxy_pass http://backend_upstream/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # -----------------------------------------------------------------
        # Streamlit WebSocket support
        # -----------------------------------------------------------------
        location /_stcore/stream {
            proxy_pass http://frontend_upstream/_stcore/stream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 86400s;  # Keep WS alive for long sessions
        }

        # -----------------------------------------------------------------
        # Frontend: Route all other traffic to Streamlit
        # -----------------------------------------------------------------
        location / {
            proxy_pass http://frontend_upstream;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Streamlit hot-reload
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # -----------------------------------------------------------------
        # Security headers
        # -----------------------------------------------------------------
        add_header X-Frame-Options        "SAMEORIGIN"    always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header Referrer-Policy        "no-referrer-when-downgrade" always;
    }
}
